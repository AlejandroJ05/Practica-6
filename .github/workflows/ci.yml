name: Hospital CI/CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile project
        run: ./mvnw compile --no-transfer-progress

      - name: Run Integration Tests
        run: |
          chmod +x mvnw
          ./mvnw verify --no-transfer-progress

      - name: List test reports
        run: ls -R target/failsafe-reports/

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados de Tests
          path: target/failsafe-reports/TEST-*.xml
          reporter: java-junit

      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/report