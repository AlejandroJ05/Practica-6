name: Hospital CI/CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile project
        run: ./mvnw compile --no-transfer-progress

      - name: Run Integration Tests
        run: |
          chmod +x mvnw
          ./mvnw verify --no-transfer-progress

      - name: List test reports
        run: ls -R target/site/

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados de Tests
          path: target/failsafe-reports/TEST-*.xml
          reporter: java-junit

      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/

      - name: Generate Jacoco Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: 'target/site/jacoco/jacoco.csv'
          push-changes: true
          coverage-badge-filename: 'jacoco.svg'
          branches-badge-filename: 'branches.svg'


      - name: Log coverage percentage
        run: echo "coverage = ${{ steps.jacoco.outputs.coverage }}"

      - name: Commit and Push Badges
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jacoco.svg branches.svg
          # Solo hacemos commit si hay cambios reales
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizados badges de cobertura" && git push)